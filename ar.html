<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mufid AR Experience</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
    background: #020617;
}

/* UI */
#ui {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    z-index: 10;
}

.btn {
    background: rgba(0,0,0,0.6);
    padding: 10px 20px;
    border-radius: 10px;
    margin-top: 10px;
    display: inline-block;
}

/* Mobile Control */
.controls {
    position: absolute;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
}

.control-btn {
    width: 70px;
    height: 70px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
}
</style>
</head>

<body>

<div id="ui">
    <h1 class="text-2xl font-bold">MUFID AR WORLD</h1>
    <p id="speed">Speed: 0</p>
    <p id="mission">Mission: Reach checkpoint</p>
    <button onclick="startGame()" class="btn">START</button>
</div>

<div class="controls">
    <div>
        <div class="control-btn" ontouchstart="controls.left=true" ontouchend="controls.left=false"></div>
    </div>
    <div>
        <div class="control-btn" ontouchstart="controls.forward=true" ontouchend="controls.forward=false"></div>
        <div class="control-btn mt-2" ontouchstart="controls.backward=true" ontouchend="controls.backward=false"></div>
    </div>
    <div>
        <div class="control-btn" ontouchstart="controls.right=true" ontouchend="controls.right=false"></div>
    </div>
</div>

<script>
// ==========================
// SCENE
// ==========================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ==========================
// LIGHT
// ==========================
const light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(50,100,50);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

// ==========================
// CITY MAP
// ==========================
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(1000,1000),
    new THREE.MeshStandardMaterial({color:0x111827})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// Buildings
for(let i=0;i<50;i++){
    const b = new THREE.Mesh(
        new THREE.BoxGeometry(20,Math.random()*80+20,20),
        new THREE.MeshStandardMaterial({color:0x1e293b})
    );
    b.position.set(
        (Math.random()-0.5)*800,
        b.geometry.parameters.height/2,
        (Math.random()-0.5)*800
    );
    scene.add(b);
}

// ==========================
// CAR
// ==========================
let car;
const loader = new THREE.GLTFLoader();
loader.load("car.glb", (gltf)=>{
    car = gltf.scene;
    car.scale.set(5,5,5);
    scene.add(car);
});

// ==========================
// SOUND
// ==========================
const listener = new THREE.AudioListener();
camera.add(listener);

const sound = new THREE.Audio(listener);
const audioLoader = new THREE.AudioLoader();

audioLoader.load("engine.mp3", function(buffer){
    sound.setBuffer(buffer);
    sound.setLoop(true);
    sound.setVolume(0.5);
});

// ==========================
// CONTROL
// ==========================
const controls = {
    forward:false,
    backward:false,
    left:false,
    right:false
};

let velocity = 0;
let direction = 0;

// Keyboard
window.addEventListener("keydown",(e)=>{
    if(e.key==="w") controls.forward=true;
    if(e.key==="s") controls.backward=true;
    if(e.key==="a") controls.left=true;
    if(e.key==="d") controls.right=true;
});

window.addEventListener("keyup",(e)=>{
    if(e.key==="w") controls.forward=false;
    if(e.key==="s") controls.backward=false;
    if(e.key==="a") controls.left=false;
    if(e.key==="d") controls.right=false;
});

// ==========================
// CAMERA FOLLOW
// ==========================
function updateCamera(){
    if(!car) return;
    camera.position.x = car.position.x + Math.sin(direction)*30;
    camera.position.z = car.position.z + Math.cos(direction)*30;
    camera.position.y = 20;
    camera.lookAt(car.position);
}

// ==========================
// MISSION
// ==========================
const checkpoint = new THREE.Mesh(
    new THREE.BoxGeometry(10,10,10),
    new THREE.MeshBasicMaterial({color:0x00ff00})
);
checkpoint.position.set(200,5,200);
scene.add(checkpoint);

// ==========================
// GAME START
// ==========================
function startGame(){
    if(!sound.isPlaying) sound.play();
}

// ==========================
// ANIMATE
// ==========================
function animate(){
    requestAnimationFrame(animate);

    if(car){
        // physics
        if(controls.forward) velocity += 0.02;
        if(controls.backward) velocity -= 0.02;

        velocity *= 0.98;

        if(controls.left) direction += 0.03;
        if(controls.right) direction -= 0.03;

        car.rotation.y = direction;

        car.position.x += Math.sin(direction)*velocity*5;
        car.position.z += Math.cos(direction)*velocity*5;

        // UI
        document.getElementById("speed").innerText =
            "Speed: " + Math.abs(velocity*100).toFixed(0);

        // Mission check
        if(car.position.distanceTo(checkpoint.position) < 20){
            document.getElementById("mission").innerText = "Mission Complete!";
        }

        updateCamera();
    }

    renderer.render(scene,camera);
}

animate();

// Resize
window.addEventListener("resize",()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
